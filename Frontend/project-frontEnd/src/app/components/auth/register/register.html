<div class="register-container">
  <div class="register-card">
    <h2>📝 Register</h2>
    <p class="subtitle">Create a new account to get started</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input 
          type="text" 
          id="fullName" 
          formControlName="fullName" 
          placeholder="Enter your full name"
          [class.error-input]="isFieldInvalid('fullName')"
        />
        <span class="error-text" *ngIf="isFieldInvalid('fullName')">
          Full Name is required.
        </span>
      </div>

      
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username" 
          placeholder="Choose a username"
          [class.error-input]="isFieldInvalid('username')"
        />
        <span class="error-text" *ngIf="isFieldInvalid('username')">
          Username must be at least 3 characters long.
        </span>
      </div>

      
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="example@mail.com"
          [class.error-input]="isFieldInvalid('email')"
        />
        <span class="error-text" *ngIf="isFieldInvalid('email')">
          Please enter a valid email address.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.error-input]="isFieldInvalid('password')"
        />
        <span class="error-text" *ngIf="isFieldInvalid('password')">
          Password must be at least 6 characters long.
        </span>
      </div>

      <div class="alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
      <div class="alert-success" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <div class="login-link">
      Already have an account? <a routerLink="/auth/login">Login</a>
    </div>
  </div>
</div>
